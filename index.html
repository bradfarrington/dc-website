<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elite Team | Sequence Event</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  
  <!-- Global Flash Overlay for explosive transition -->
  <div class="flash-overlay" id="flash-overlay"></div>

  <!-- PHASE 1: INITIAL STATE -->
  <section class="section-initial" id="section-initial">
    <div class="initial-content">
      <div class="pos-top">
        <div class="top-label brand-label">ELITE TEAM</div>
      </div>
      <div class="pos-center">
        <!-- Core Button -->
        <button class="core-trigger" id="core-trigger" aria-label="Activate AI System">
          <div class="core-ring core-ring-1"></div>
          <div class="core-ring core-ring-2"></div>
          <div class="core-center"></div>
        </button>
      </div>
      <div class="pos-bottom">
        <div class="warning-text">
          <h1 class="glitch-headline" data-text="DO NOT ACTIVATE">DO NOT ACTIVATE</h1>
          <div class="warning-backdrop">
            <p class="warning-subtext">This will change how your business operates</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- PHASE 2: VIDEO STATE -->
  <section class="section-video" id="section-video">
    <div class="video-wrapper">
      <video muted playsinline id="bg-video" preload="auto">
        <!-- Javascript dynamically evaluates and injects the proper <source> target mapping device boundaries securely -->
        Your browser does not support HTML5 video.
      </video>
    </div>
  </section>

  <!-- PHASE 3: DYNAMIC GSAP ARRAY ITERATOR -->
  <section class="section-interstitial" id="section-interstitial">
    <h2 class="cinematic-text" id="cinematic-text"></h2>
  </section>

  <!-- PHASE 4: FINAL HYPER-MINIMAL HERO -->
  <section class="section-final" id="section-final">
    
    <!-- Z-INDEX 1: LOGO (Background Layer) -->
    <div class="layer-logo">
      <img src="./DG - LOGO AND TEXT - WHITE - NO BG.png" alt="Digital Craft - AI Systems" class="final-logo">
    </div>

    <!-- Z-INDEX 2: Custom THREE.JS Neural Mesh (Seamless responsive bounds mapped to screen rendering) -->
    <div class="layer-mesh">
      <canvas id="webgl-canvas"></canvas>
    </div>

    <!-- Z-INDEX 3: WAITLIST (Foreground CTA Layer anchored dead center) -->
    <div class="glass-content">
      <h2 class="final-heading">Outpace The Competition.</h2>
      <form class="waitlist-form" onsubmit="event.preventDefault();">
        <input type="email" placeholder="Enter your email address" required class="email-input" aria-label="Email Address" />
        <button type="submit" class="btn-cta">Get Early Access</button>
      </form>
      <p class="limitation-text">Built for a limited number of businesses.</p>
    </div>

  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
