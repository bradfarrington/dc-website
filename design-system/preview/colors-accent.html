<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Accent in use</title>
<link rel="stylesheet" href="_card.css">
<style>
.demo { display: grid; grid-template-columns: 1.05fr 1fr; gap: 16px; align-items: stretch; }
.dark-block { position: relative; background: #000; color: #fff; border-radius: 10px; padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
.dark-block::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
.dark-block > * { position: relative; }
.dark-block .h { font-family: var(--font-display); font-size: 22px; line-height: 1.1; letter-spacing: -0.02em; }
.dark-block .h em { font-style: normal; color: #60A5FA; }
.row-link { display: inline-flex; align-items: center; gap: 8px; align-self: flex-start; font: 500 12px/1 var(--font-body); color: #60A5FA; text-decoration: none; padding: 6px 0; }
.row-link::after { content: ""; width: 28px; height: 1px; background: #3B82F6; box-shadow: 0 0 8px rgba(96,165,250,.6); }
.tokens { display: flex; flex-direction: column; gap: 9px; justify-content: center; }
.tok { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--fg-2); }
.tok .sw { width: 26px; height: 26px; border-radius: 6px; flex: 0 0 auto; }
.tok .nm { font-weight: 600; color: var(--fg-1); }
.tok .hx { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-left: auto; }
</style>
</head><body>
<div class="card">
  <div class="demo">
    <div class="dark-block">
      <div class="lbl" style="color:#A3A3A3">Accent as energy · not decoration</div>
      <div class="h">Energy running <em>through</em> the system.</div>
      <a class="row-link" href="#">See how it connects</a>
    </div>
    <div class="tokens">
      <div class="tok"><div class="sw" style="background:#3B82F6"></div><div class="nm">--accent</div><div class="hx">#3B82F6</div></div>
      <div class="tok"><div class="sw" style="background:#60A5FA"></div><div class="nm">--accent-hover</div><div class="hx">#60A5FA</div></div>
      <div class="tok"><div class="sw" style="background:#2563EB"></div><div class="nm">--accent-press</div><div class="hx">#2563EB</div></div>
      <div class="tok"><div class="sw" style="background:rgba(59,130,246,.12);outline:1px solid #E2EBFB"></div><div class="nm">--accent-soft</div><div class="hx">12% tint</div></div>
      <div class="tok"><div class="sw" style="background:#0A0A0A;box-shadow:0 0 14px 2px rgba(96,165,250,.55), 0 0 28px 4px rgba(96,165,250,.25)"></div><div class="nm">--sh-glow</div><div class="hx">soft</div></div>
    </div>
  </div>
</div>
</body></html>
