<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Elevation</title>
<link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: end; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 18px 0 8px; }
.cell .sq { width: 100px; height: 64px; background: #fff; border: 1px solid #EAEAEA; border-radius: 8px; }
.cell .nm { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
.cell .desc { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body>
<div class="card" style="background:#F5F5F5">
  <div class="row">
    <div class="cell"><div class="sq" style="box-shadow:none"></div><div class="nm">flat · default</div><div class="desc">cards at rest</div></div>
    <div class="cell"><div class="sq" style="box-shadow:0 2px 8px rgba(0,0,0,.06)"></div><div class="nm">sm</div><div class="desc">tooltips</div></div>
    <div class="cell"><div class="sq" style="box-shadow:0 8px 24px rgba(0,0,0,.08)"></div><div class="nm">md</div><div class="desc">menus</div></div>
    <div class="cell"><div class="sq" style="box-shadow:0 0 0 4px rgba(96,165,250,.45)"></div><div class="nm">glow</div><div class="desc">accent only</div></div>
  </div>
</div>
</body></html>
