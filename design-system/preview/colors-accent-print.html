<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Accent in use — print</title>
<link rel="stylesheet" href="_card.css">
<style>
@page { size: landscape; margin: 1cm; }

html, body { background: #fff; }
body { padding: 24px; }

* { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

.card { width: 100%; max-width: 900px; margin: 0 auto; padding: 0; }

.demo { display: grid; grid-template-columns: 1.05fr 1fr; gap: 20px; align-items: stretch; break-inside: avoid; }
.dark-block { position: relative; background: #000; color: #fff; border-radius: 10px; padding: 28px 30px; display: flex; flex-direction: column; gap: 16px; overflow: hidden; min-height: 220px; }
.dark-block::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
.dark-block > * { position: relative; }
.dark-block .lbl { font: 500 11px/1 var(--font-body); letter-spacing: 0.12em; text-transform: uppercase; color: #A3A3A3; }
.dark-block .h { font-family: var(--font-display); font-size: 26px; line-height: 1.1; letter-spacing: -0.02em; }
.dark-block .h em { font-style: normal; color: #60A5FA; }
.row-link { display: inline-flex; align-items: center; gap: 10px; align-self: flex-start; font: 500 13px/1 var(--font-body); color: #60A5FA; text-decoration: none; padding: 6px 0; }
.row-link::after { content: ""; width: 32px; height: 1px; background: #3B82F6; box-shadow: 0 0 8px rgba(96,165,250,.6); }

.tokens { display: flex; flex-direction: column; gap: 12px; justify-content: center; padding: 8px 4px; }
.tok { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--fg-2); }
.tok .sw { width: 28px; height: 28px; border-radius: 6px; flex: 0 0 auto; }
.tok .nm { font-weight: 600; color: var(--fg-1); }
.tok .hx { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); margin-left: auto; }

.title { font-family: var(--font-display); font-size: 18px; letter-spacing: -0.015em; color: var(--fg-1); margin: 0 0 18px; padding-bottom: 12px; border-bottom: 1px solid #EAEAEA; display: flex; justify-content: space-between; align-items: baseline; }
.title small { font: 400 11px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0; }
</style>
</head><body>
<div class="card">
  <div class="title">Colors — accent in use <small>Digital Craft Design System</small></div>
  <div class="demo">
    <div class="dark-block">
      <div class="lbl">Accent as energy · not decoration</div>
      <div class="h">Energy running <em>through</em> the system.</div>
      <a class="row-link" href="#">See how it connects</a>
    </div>
    <div class="tokens">
      <div class="tok"><div class="sw" style="background:#3B82F6"></div><div class="nm">--accent</div><div class="hx">#3B82F6</div></div>
      <div class="tok"><div class="sw" style="background:#60A5FA"></div><div class="nm">--accent-hover</div><div class="hx">#60A5FA</div></div>
      <div class="tok"><div class="sw" style="background:#2563EB"></div><div class="nm">--accent-press</div><div class="hx">#2563EB</div></div>
      <div class="tok"><div class="sw" style="background:rgba(59,130,246,.12);outline:1px solid #E2EBFB"></div><div class="nm">--accent-soft</div><div class="hx">12% tint</div></div>
      <div class="tok"><div class="sw" style="background:#0A0A0A;box-shadow:0 0 14px 2px rgba(96,165,250,.55), 0 0 28px 4px rgba(96,165,250,.25)"></div><div class="nm">--sh-glow</div><div class="hx">soft</div></div>
    </div>
  </div>
</div>

<script>
(async () => {
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }
  setTimeout(() => window.print(), 500);
})();
</script>
</body></html>
