<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field .lab { font: 500 12px/1 var(--font-body); letter-spacing: .04em; text-transform: uppercase; color: var(--fg-3); }
.input {
  font: 400 14px/1 var(--font-body); color: #0A0A0A;
  background: #fff; border: 1px solid #D4D4D4; border-radius: 8px;
  padding: 11px 12px;
  transition: all 160ms cubic-bezier(.2,.8,.2,1);
}
.input::placeholder { color: #A3A3A3; }
.input.focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,.5); outline: none; }
.input.error { border-color: #EF4444; }
.input.disabled { background: #F5F5F5; color: #A3A3A3; }
.help { font: 400 11.5px/1.4 var(--font-body); color: var(--fg-3); }
.help.err { color: #EF4444; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="field"><div class="lab">Email</div><input class="input" placeholder="you@company.com"></div>
    <div class="field"><div class="lab">Email · focus</div><input class="input focus" value="alex@digitalcraft.co"></div>
    <div class="field"><div class="lab">Company</div><input class="input" value="Acme Logistics"></div>
    <div class="field"><div class="lab">Email · error</div><input class="input error" value="not-an-email"><div class="help err">Use your work email.</div></div>
    <div class="field"><div class="lab">Notes</div><textarea class="input" rows="2" placeholder="What process is broken?"></textarea></div>
    <div class="field"><div class="lab">Disabled</div><input class="input disabled" value="Account locked" disabled></div>
  </div>
</div>
</body></html>
