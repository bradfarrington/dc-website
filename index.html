<style>
/* ============================
   RESET + BASE
   ============================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  color: var(--fg-1);
  background: var(--dc-white);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* ============================
   LAYOUT
   ============================ */
.wrap {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.section { padding: 112px 0; position: relative; }
.section-sm { padding: 64px 0; position: relative; }
.section-dark { background: var(--dc-black); color: var(--dc-white); }
.section-paper { background: var(--dc-paper); }
.section-ink { background: var(--dc-ink); color: var(--dc-white); }

/* ============================
   BUTTONS
   ============================ */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500; line-height: 1;
  padding: 13px 20px; border-radius: var(--r-md); border: 1px solid transparent;
  cursor: pointer; white-space: nowrap; user-select: none;
  transition: background var(--dur-base) var(--ease-out),
              color var(--dur-base) var(--ease-out),
              border-color var(--dur-base) var(--ease-out),
              box-shadow var(--dur-base) var(--ease-out),
              transform var(--dur-fast) var(--ease-out);
}
.btn-primary { background: var(--dc-accent); color: #fff; }
.btn-primary:hover { background: var(--dc-accent-hover); box-shadow: 0 0 0 5px rgba(96,165,250,.28); }
.btn-primary:active { background: var(--dc-accent-press); transform: translateY(1px); box-shadow: none; }
.btn-outline { background: transparent; color: var(--dc-white); border-color: rgba(255,255,255,0.3); }
.btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.06); }
.btn-outline-dark { background: transparent; color: var(--dc-black); border-color: rgba(0,0,0,0.25); }
.btn-outline-dark:hover { border-color: var(--dc-black); background: var(--dc-paper); }
.btn-lg { padding: 16px 26px; font-size: 15px; }
.btn-arrow::after {
  content: ""; display: inline-block; width: 16px; height: 1px; background: currentColor;
  transition: width var(--dur-base) var(--ease-out);
}
.btn:hover .btn-arrow::after, .btn.btn-arrow:hover::after { width: 26px; }

/* ============================
   EYEBROW
   ============================ */
.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--dc-slate);
}
.eyebrow::before {
  content: ""; width: 20px; height: 1px; background: var(--dc-accent);
  box-shadow: 0 0 6px rgba(96,165,250,.55); flex-shrink: 0;
}
.eyebrow-white { color: rgba(255,255,255,0.5); }
.eyebrow-white::before { background: var(--dc-accent-hover); }

/* ============================
   NAV
   ============================ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  background: rgba(8,10,14,0.55);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  transition: background-color var(--dur-base) var(--ease-out),
              border-color var(--dur-base) var(--ease-out);
}
.nav.nav-scrolled {
  background: rgba(0,0,0,0.94);
  border-bottom-color: rgba(255,255,255,0.12);
}
.nav-inner {
  display: flex; align-items: center; gap: 0; height: 68px;
}
.nav-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-right: 40px; }
.nav-brand img { height: 34px; }
.nav-brand span { font-family: var(--font-display); font-size: 19px; letter-spacing: -0.025em; color: var(--dc-white); }
.nav-links { display: flex; gap: 6px; flex: 1; }
.nav-links a {
  font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7);
  padding: 7px 12px; border-radius: var(--r-md);
  transition: color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);
}
.nav-links a:hover { color: var(--dc-white); background: rgba(255,255,255,0.08); }
.nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.nav .btn-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.18); }
.nav .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.32); color: var(--dc-white); }
.nav-hamburger {
  display: none; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: var(--r-md);
  border: none; background: transparent; cursor: pointer;
  color: var(--dc-white); margin-left: auto;
}
.nav-hamburger:hover { background: rgba(255,255,255,0.08); }
.mobile-menu {
  position: fixed; top: 68px; left: 0; right: 0; z-index: 49;
  display: none; flex-direction: column; gap: 0;
  background: rgba(0,0,0,0.96);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 8px 0 16px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  display: block; padding: 12px 24px;
  font-size: 15px; font-weight: 500; color: var(--dc-white);
}
.mobile-menu a:hover { background: rgba(255,255,255,0.08); }
.mobile-menu-cta { padding: 12px 24px; }

/* ============================
   HERO
   ============================ */
.hero {
  background: var(--dc-black);
  padding: 196px 0 112px;
  position: relative; overflow: hidden;
}
.hero-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.045) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.045) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 100%);
  z-index: 1;
}
.hero-mesh-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.85;
}
.hero-mesh-fade {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, transparent 0%, rgba(0,0,0,0.55) 90%),
    linear-gradient(to bottom, transparent 60%, var(--dc-black));
  z-index: 1;
}
.hero-accent-line {
  position: absolute; top: 0; left: 50%; width: 1px; height: 100%;
  background: linear-gradient(to bottom, transparent, var(--dc-accent) 40%, transparent);
  opacity: 0.18; pointer-events: none;
  z-index: 2;
}
.hero-content { position: relative; max-width: 960px; z-index: 2; }
.hero-eyebrow { margin-bottom: 28px; }
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(52px, 7.5vw, 108px);
  line-height: 0.96; letter-spacing: -0.048em;
  color: var(--dc-white); margin-bottom: 32px;
}
.hero h1 em { font-style: normal; color: var(--dc-accent); }
.hero-lede {
  font-size: clamp(17px, 2vw, 20px); line-height: 1.6; color: rgba(255,255,255,0.6);
  max-width: 600px; margin-bottom: 44px; text-wrap: pretty;
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.hero-metric-row {
  display: flex; gap: 48px; margin-top: 80px; padding-top: 48px;
  border-top: 1px solid rgba(255,255,255,0.08);
  flex-wrap: wrap;
}
.hero-metric { display: flex; flex-direction: column; gap: 4px; }
.hero-metric-num {
  font-family: var(--font-display);
  font-size: 44px; line-height: 1; letter-spacing: -0.04em; color: var(--dc-white);
}
.hero-metric-num span { color: var(--dc-accent); }
.hero-metric-label { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.04em; font-weight: 500; }

/* ============================
   CAPABILITIES STRIP
   ============================ */
.cap-strip {
  background: var(--dc-white);
  border-bottom: 1px solid var(--dc-fog);
  padding: 24px 0;
  overflow: hidden;
}
.cap-strip-inner { display: flex; align-items: center; gap: 48px; }
.cap-strip-items { display: flex; gap: 36px; flex-wrap: wrap; }
.cap-strip-item {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 16px; letter-spacing: -0.015em;
  color: var(--dc-charcoal); white-space: nowrap;
}
.cap-strip-dot { width: 4px; height: 4px; border-radius: 99px; background: var(--dc-accent); flex-shrink: 0; }

/* ============================
   PROBLEM
   ============================ */
.problem-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
  border: 1px solid var(--dc-fog); border-radius: var(--r-lg); overflow: hidden;
  margin-top: 56px;
}
.problem-card {
  padding: 36px; border-right: 1px solid var(--dc-fog); border-bottom: 1px solid var(--dc-fog);
  display: flex; flex-direction: column; gap: 14px;
  transition: background var(--dur-base) var(--ease-out);
}
.problem-card:nth-child(2n) { border-right: none; }
.problem-card:nth-last-child(-n+2) { border-bottom: none; }
.problem-card:hover { background: var(--dc-paper); }
.problem-card-icon {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--dc-fog); border-radius: var(--r-md);
  color: var(--dc-slate);
}
.problem-card h3 {
  font-family: var(--font-display); font-size: 22px; letter-spacing: -0.02em;
  line-height: 1.2; color: var(--dc-black);
}
.problem-card p { font-size: 15px; line-height: 1.6; color: var(--dc-slate); }
.problem-cost {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 12px; color: var(--dc-accent);
  background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
  border-radius: var(--r-sm); padding: 4px 10px; width: fit-content;
}

/* ============================
   SYSTEM / SOLUTION
   ============================ */
.system-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 96px; align-items: center; }
.system-points { display: flex; flex-direction: column; gap: 0; margin-top: 48px; }
.system-point {
  display: flex; gap: 20px; padding: 28px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.system-point:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
.system-point-num {
  font-family: var(--font-mono); font-size: 11px; color: var(--dc-accent);
  width: 24px; flex-shrink: 0; padding-top: 3px;
}
.system-point-body {}
.system-point h4 {
  font-family: var(--font-display); font-size: 20px; letter-spacing: -0.02em;
  color: var(--dc-white); margin-bottom: 8px;
}
.system-point p { font-size: 14.5px; line-height: 1.6; color: rgba(255,255,255,0.5); }
.system-diagram {
  position: relative; background: var(--dc-bg-alt);
  border: 1px solid var(--dc-graphite); border-radius: var(--r-xl);
  padding: 32px; aspect-ratio: 1/1; max-width: 420px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.sys-node {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: var(--dc-graphite); border: 1px solid #333; border-radius: var(--r-md);
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8);
  position: relative;
}
.sys-node.active {
  background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.4);
  color: var(--dc-white);
}
.sys-node-dot {
  width: 8px; height: 8px; border-radius: 99px;
  background: var(--dc-charcoal); flex-shrink: 0;
}
.sys-node.active .sys-node-dot { background: var(--dc-accent); box-shadow: 0 0 8px rgba(96,165,250,.6); }
.sys-connector {
  height: 1px; background: var(--dc-graphite); position: relative; margin: 2px 0;
}
.sys-connector.active {
  background: linear-gradient(90deg, var(--dc-accent), rgba(96,165,250,.3));
  box-shadow: 0 0 6px rgba(96,165,250,.3);
}
.sys-node-row { display: flex; gap: 12px; }
.sys-node-row .sys-node { flex: 1; font-size: 12px; padding: 10px 12px; }
.sys-sub-connector {
  display: flex; gap: 12px;
}
.sys-sub-connector::before, .sys-sub-connector::after {
  content: ""; flex: 1; height: 1px; background: var(--dc-graphite); align-self: center;
}

/* ============================
   CAPABILITIES
   ============================ */
.cap-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; margin-top: 56px; border: 1px solid var(--dc-fog); border-radius: var(--r-lg); overflow: hidden; }
.cap-card {
  padding: 40px; border-right: 1px solid var(--dc-fog); border-bottom: 1px solid var(--dc-fog);
  display: flex; flex-direction: column; gap: 20px;
  transition: background var(--dur-base) var(--ease-out);
  cursor: default;
}
.cap-card:nth-child(2n) { border-right: none; }
.cap-card:nth-last-child(-n+2) { border-bottom: none; }
.cap-card:hover { background: var(--dc-paper); }
.cap-card-tag {
  font-family: var(--font-mono); font-size: 11px; color: var(--dc-accent);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.cap-card h3 {
  font-family: var(--font-display); font-size: 28px; letter-spacing: -0.025em;
  line-height: 1.1; color: var(--dc-black);
}
.cap-card p { font-size: 15px; line-height: 1.6; color: var(--dc-slate); flex: 1; }
.cap-card-outcomes { display: flex; flex-direction: column; gap: 8px; }
.cap-outcome {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px; color: var(--dc-charcoal); line-height: 1.4;
}
.cap-outcome::before {
  content: ""; width: 16px; height: 1px; background: var(--dc-accent); flex-shrink: 0; margin-top: 8px;
}

/* ============================
   BEFORE / AFTER
   ============================ */
.transformation { padding: 112px 0; }
.ba-header { text-align: center; margin-bottom: 64px; }
.ba-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; align-items: stretch; }
.ba-col {
  border: 1px solid var(--dc-fog); border-radius: var(--r-lg); overflow: hidden;
}
.ba-col-header {
  padding: 20px 28px; border-bottom: 1px solid var(--dc-fog);
  display: flex; align-items: center; gap: 10px;
}
.ba-col-header-before { background: var(--dc-paper); }
.ba-col-header-after { background: rgba(59,130,246,0.06); border-bottom-color: rgba(59,130,246,0.2); }
.ba-label {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
}
.ba-label-before { color: var(--dc-slate); }
.ba-label-after { color: var(--dc-accent); }
.ba-col-body { padding: 28px; display: flex; flex-direction: column; gap: 0; }
.ba-item {
  display: flex; align-items: flex-start; gap: 14px; padding: 16px 0;
  border-bottom: 1px solid var(--dc-fog); font-size: 15px; line-height: 1.45;
}
.ba-item:last-child { border-bottom: none; }
.ba-item-before { color: var(--dc-slate); }
.ba-item-after { color: var(--dc-black); }
.ba-icon-before { color: var(--dc-stone); margin-top: 1px; flex-shrink: 0; }
.ba-icon-after { color: var(--dc-accent); margin-top: 1px; flex-shrink: 0; }
.ba-divider {
  display: flex; align-items: center; justify-content: center;
  padding: 0 20px;
}
.ba-arrow {
  width: 40px; height: 40px; border-radius: 99px;
  background: var(--dc-black); color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ============================
   HOW IT WORKS
   ============================ */
.how-steps {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0; position: relative; margin-top: 64px;
  border: 1px solid var(--dc-fog); border-radius: var(--r-lg); overflow: hidden;
}
.how-step {
  padding: 40px 36px; border-right: 1px solid var(--dc-fog); position: relative;
  transition: background var(--dur-base) var(--ease-out);
}
.how-step:last-child { border-right: none; }
.how-step:hover { background: rgba(59,130,246,0.03); }
.how-step-num {
  font-family: var(--font-mono); font-size: 48px; font-weight: 400;
  line-height: 1; letter-spacing: -0.04em; color: var(--dc-fog);
  margin-bottom: 20px; display: block;
}
.how-step-icon {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(59,130,246,0.3); border-radius: var(--r-md);
  color: var(--dc-accent); margin-bottom: 20px;
  background: rgba(59,130,246,0.06);
}
.how-step h3 {
  font-family: var(--font-display); font-size: 26px; letter-spacing: -0.025em;
  color: var(--dc-black); margin-bottom: 12px;
}
.how-step p { font-size: 15px; line-height: 1.6; color: var(--dc-slate); }
.how-connector {
  position: absolute; top: 44px; right: -12px; z-index: 2;
  width: 24px; height: 24px; border-radius: 99px;
  background: var(--dc-white); border: 1px solid var(--dc-fog);
  display: flex; align-items: center; justify-content: center;
  color: var(--dc-stone);
}
.how-step:last-child .how-connector { display: none; }

/* ============================
   TESTIMONIAL
   ============================ */
.testimonial-section {
  background: var(--dc-black); padding: 112px 0;
  position: relative; overflow: hidden;
}
.testimonial-bg {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black, transparent);
  -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black, transparent);
}
.testimonial-quote {
  font-family: var(--font-display);
  font-size: clamp(26px, 3.5vw, 50px);
  line-height: 1.18; letter-spacing: -0.03em;
  color: var(--dc-white); max-width: 900px; position: relative; text-wrap: balance;
}
.testimonial-quote em { font-style: normal; color: var(--dc-accent-hover); }
.testimonial-attr {
  display: flex; align-items: center; gap: 14px; margin-top: 36px; position: relative;
}
.testimonial-av {
  width: 44px; height: 44px; border-radius: 99px;

<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Scroll helper ───────────────────────────────────────── */
function scrollToSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const top = el.getBoundingClientRect().top + window.scrollY - 80;
  window.scrollTo({ top, behavior: "smooth" });
}

/* ─── Icon helper ─────────────────────────────────────────── */
function Icon({ name, size = 20, strokeWidth = 1.5 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.setAttribute("data-lucide", name);
    ref.current.innerHTML = "";
    window.lucide.createIcons({
      attrs: { width: size, height: size, "stroke-width": strokeWidth },
      nameAttr: "data-lucide",
      elements: [ref.current],
    });
  }, [name, size, strokeWidth]);
  return <i ref={ref} style={{ display: "inline-flex", alignItems: "center" }}></i>;
}

/* ─── Nav ─────────────────────────────────────────────────── */
function Nav({ onCTA }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 80);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const navLinks = [
    { label: "What we build", id: "what-we-build" },
    { label: "Problems we fix", id: "problems" },
    { label: "How it works", id: "how-it-works" },
    { label: "Case studies", id: "case-studies" },
  ];
  const handleNav = (id) => { setMenuOpen(false); scrollToSection(id); };
  return (
    <>
      <nav className={"nav" + (scrolled ? " nav-scrolled" : "")}>
        <div className="wrap nav-inner">
          <a href="#" className="nav-brand" onClick={e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: "smooth" }); }}>
            <img src="assets/logo-wordmark-white.png" alt="Digital Craft" />
          </a>
          <div className="nav-links">
            {navLinks.map(l => (
              <a key={l.id} href={"#" + l.id} onClick={e => { e.preventDefault(); scrollToSection(l.id); }}>{l.label}</a>
            ))}
          </div>
          <div className="nav-actions">
            <button className="btn btn-ghost" onClick={onCTA}>Contact</button>
            <button className="btn btn-primary btn-arrow" onClick={onCTA}>Book a system audit</button>
          </div>
          <button className="nav-hamburger" onClick={() => setMenuOpen(o => !o)} aria-label="Menu">
            <Icon name={menuOpen ? "x" : "menu"} size={20} />
          </button>
        </div>
      </nav>
      <div className={"mobile-menu" + (menuOpen ? " open" : "")}>
        {navLinks.map(l => (
          <a key={l.id} href={"#" + l.id} onClick={e => { e.preventDefault(); handleNav(l.id); }}>{l.label}</a>
        ))}
        <div className="mobile-menu-cta">
          <button className="btn btn-primary btn-arrow" style={{ width: "100%", justifyContent: "center" }}
            onClick={() => { setMenuOpen(false); onCTA(); }}>
            Book a system audit
          </button>
        </div>
      </div>
    </>
  );
}

/* ─── Hero ────────────────────────────────────────────────── */
function HeroMeshCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !window.THREE) return;
    const THREE = window.THREE;

    const hero = canvas.parentElement;
    const getSize = () => ({
      w: hero.clientWidth || window.innerWidth,
      h: hero.clientHeight || window.innerHeight,
    });

    const scene = new THREE.Scene();
    let { w, h } = getSize();
    const camera = new THREE.PerspectiveCamera(60, w / h, 1, 3000);
    camera.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h, false);

    const particleCount = 4000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const colorAccent = new THREE.Color(0xa78bfa);
    const colorWhite = new THREE.Color(0xffffff);

    for (let i = 0; i < particleCount; i++) {
      const r = 100 + 1200 * Math.random();
      const theta = 2 * Math.PI * Math.random();
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
      const mix = Math.random();
      const c = mix > 0.5 ? colorAccent : colorWhite;
      colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 1.2, vertexColors: true, transparent: true,
      opacity: 0.9, blending: THREE.AdditiveBlending,
    });
    const mesh = new THREE.Points(geometry, material);
    scene.add(mesh);

    let mouseX = 0, mouseY = 0;
    const onMove = (e) => {
      const rect = hero.getBoundingClientRect();
      if (e.clientY < rect.top || e.clientY > rect.bottom) return;
      mouseX = e.clientX - (rect.left + rect.width / 2);
      mouseY = e.clientY - (rect.top + rect.height / 2);
    };
    document.addEventListener('mousemove', onMove);

    let running = true;
    const tick = () => {
      if (!running) return;
      requestAnimationFrame(tick);
      mesh.rotation.y += 0.0008;
      mesh.rotation.x += 0.0004;
      camera.rotation.x += (-mouseY * 0.0008 - camera.rotation.x) * 0.05;
      camera.rotation.y += (-mouseX * 0.0008 - camera.rotation.y) * 0.05;
      renderer.render(scene, camera);
    };
    tick();

    const onResize = () => {
      const s = getSize();
      camera.aspect = s.w / s.h;
      camera.updateProjectionMatrix();
      renderer.setSize(s.w, s.h, false);
    };
    window.addEventListener('resize', onResize);

    return () => {
      running = false;
      window.removeEventListener('resize', onResize);
      document.removeEventListener('mousemove', onMove);
      geometry.dispose(); material.dispose(); renderer.dispose();
    };
  }, []);
  return <canvas ref={canvasRef} className="hero-mesh-canvas" aria-hidden="true"></canvas>;
}

function Hero({ onCTA }) {
  return (
    <section className="hero" data-screen-label="01 Hero">
      <HeroMeshCanvas />
      <div className="hero-mesh-fade"></div>
      <div className="hero-grid"></div>
      <div className="hero-accent-line"></div>
      <div className="wrap">
        <div className="hero-content">
          <div className="eyebrow eyebrow-white hero-eyebrow">Custom-built · Done for you · Designed around your business</div>
          <h1>Your business runs on<br /><em>manual work.</em><br />That ends here.</h1>
          <p className="hero-lede">
            We build custom systems that remove manual work, connect your processes, and keep everything running smoothly behind the scenes.
          </p>
          <div className="hero-actions">
            <button className="btn btn-primary btn-lg btn-arrow" onClick={onCTA}>
              Book a system audit
            </button>
            <button className="btn btn-outline btn-lg" onClick={() => scrollToSection("how-it-works")}>
              See how it works
            </button>
          </div>
          <div className="hero-metric-row">
            <div className="hero-metric">
              <div className="hero-metric-num">100<span>%</span></div>
              <div className="hero-metric-label">custom to your process</div>
            </div>
            <div className="hero-metric">
              <div className="hero-metric-num">3<span>wk</span></div>
              <div className="hero-metric-label">typical project timeline</div>
            </div>
            <div className="hero-metric">
              <div className="hero-metric-num">0</div>
              <div className="hero-metric-label">off-the-shelf software</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── Capabilities Strip ──────────────────────────────────── */
function CapStrip() {
  const items = ["Custom websites", "CRM systems", "Mobile apps", "Workflow automation", "Internal tools", "API integrations"];
  return (
    <div className="cap-strip" id="what-we-build">
      <div className="wrap cap-strip-inner">
        <span className="eyebrow" style={{ flexShrink: 0 }}>What we build</span>
        <div className="cap-strip-items">
          {items.map(i => (
            <span key={i} className="cap-strip-item">
              <span className="cap-strip-dot"></span>
              {i}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── Problem ─────────────────────────────────────────────── */
function Problem() {
  const cards = [
    {
      icon: "layers", h: "Disconnected tools, lost data",
      p: "Your CRM doesn't talk to your website. Your invoicing doesn't talk to either. Every piece of information lives in a different place — and your team is the glue holding it together.",
      cost: "Data re-entry that should never exist"
    },
    {
      icon: "clock", h: "Admin work that never ends",
      p: "Chasing approvals, copy-pasting between spreadsheets, formatting reports by hand. Work that should take seconds takes hours — because there's no structure behind it.",
      cost: "Manual processes are expensive and slow"
    },
    {
      icon: "alert-triangle", h: "Human error you can't catch",
      p: "When a person handles every step, mistakes happen. A missed lead. A wrong figure in a report. A task that fell through because no-one knew who owned it.",
      cost: "Uncaught errors cost time and reputation"
    },
    {
      icon: "trending-down", h: "Growth that breaks your process",
      p: "The approach that worked at five people falls apart at fifteen. You hired for growth but your tools didn't scale. Now you're managing people managing workarounds.",
      cost: "Scaling chaos isn't growth"
    },

/* ─── Audit Modal ────────────────────────────────────────── */
function Modal({ open, onClose, onSubmit }) {
  const [form, setForm] = useState({ name: "", email: "", company: "", problem: "" });
  const [submitting, setSubmitting] = useState(false);
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const handleSubmit = async () => {
    if (submitting) return;
    setSubmitting(true);
    try {
      const ok = await onSubmit(form);
      if (ok) setForm({ name: "", email: "", company: "", problem: "" });
    } finally {
      setSubmitting(false);
    }
  };
  if (!open) return null;
  return (
    <div className="modal-scrim open" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-eyebrow"><span className="eyebrow">System audit</span></div>
        <h3>Tell us what's broken.</h3>
        <p className="modal-sub">30 minutes. We'll map the messiest part of your operation and show you what to build first. No sales deck. No obligation.</p>
        <div className="modal-field"><label>Name</label><input className="modal-input" value={form.name} onChange={set("name")} placeholder="Alex Mason" /></div>
        <div className="modal-field"><label>Work email</label><input className="modal-input" type="email" value={form.email} onChange={set("email")} placeholder="alex@company.com" /></div>
        <div className="modal-field"><label>Company</label><input className="modal-input" value={form.company} onChange={set("company")} placeholder="Northway Logistics" /></div>
        <div className="modal-field"><label>What's the bottleneck?</label><textarea className="modal-input" rows={3} value={form.problem} onChange={set("problem")} placeholder="We're losing leads between the website and the CRM..." /></div>
        <div className="modal-actions">
          <button className="btn btn-primary btn-arrow" style={{ flex: 1, justifyContent: "center" }} onClick={handleSubmit} disabled={submitting}>
            {submitting ? "Sending…" : "Request audit"}
          </button>
          <button className="btn btn-ghost" onClick={onClose} disabled={submitting}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Toast ──────────────────────────────────────────────── */
function Toast({ show, message }) {
  return (
    <div className={"toast" + (show ? " show" : "")}>
      <span className="toast-dot"></span>
      {message}
    </div>
  );
}

/* ─── App ────────────────────────────────────────────────── */
function App() {
  const [modalOpen, setModalOpen] = useState(false);
  const [toast, setToast] = useState({ show: false, msg: "" });

  const openCTA = () => setModalOpen(true);
  const showToast = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast(t => ({ ...t, show: false })), 4500);
  };
  const submitAudit = async (form) => {
    if (!form.name.trim() || !form.email.trim() || !form.problem.trim()) {
      showToast("Please fill in your name, email, and the bottleneck.");
      return false;
    }
    try {
      const res = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify({
          access_key: "c3ecc691-837f-489f-97b8-64d5a93dbac2",
          subject: `New system audit request — ${form.company || form.name}`,
          from_name: "Digital Craft website",
          name: form.name,
          email: form.email,
          company: form.company,
          message: form.problem,
        }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || "Submission failed");
      setModalOpen(false);
      showToast("Request received — we'll be in touch within 24 hours.");
      return true;
    } catch (err) {
      showToast("Couldn't send right now. Please try again or email info@thedigicraft.co.uk.");
      return false;
    }
  };

  useEffect(() => {
    if (window.location.hash === "#book-audit") {
      setModalOpen(true);
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }
  }, []);

  return (
    <>
      <Nav onCTA={openCTA} />
      <Hero onCTA={openCTA} />
      <CapStrip />
      <Problem />
      <System />
      <Capabilities />
      <Transformation />
      <HowItWorks />
      <CaseStudies />
      <Reviews />
      <FinalCTA onCTA={openCTA} />
      <Footer onCTA={openCTA} />
      <Modal open={modalOpen} onClose={() => setModalOpen(false)} onSubmit={submitAudit} />
      <Toast show={toast.show} message={toast.msg} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

window.addEventListener("message", e => {
  if (e.data?.type === "__activate_edit_mode") document.getElementById("tweaks-panel")?.classList.remove("tweaks-hidden");
  if (e.data?.type === "__deactivate_edit_mode") document.getElementById("tweaks-panel")?.classList.add("tweaks-hidden");
});
window.parent.postMessage({ type: "__edit_mode_available" }, "*");
</script>

</body>
</html>
