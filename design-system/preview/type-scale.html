<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
.scale { display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); }
.row:last-child { border: 0; }
.row .name { width: 60px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); flex: 0 0 auto;}
.row .sample { font-family: var(--font-display); color: var(--fg-1); letter-spacing: -0.025em; line-height: 1; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); flex: 0 0 auto; }
</style>
</head><body>
<div class="card">
  <div class="scale">
    <div class="row"><div class="name">h1</div><div class="sample" style="font-size:64px;letter-spacing:-0.04em">Headline</div><div class="px">64 / 1.05</div></div>
    <div class="row"><div class="name">h2</div><div class="sample" style="font-size:48px">Heading</div><div class="px">48 / 1.1</div></div>
    <div class="row"><div class="name">h3</div><div class="sample" style="font-size:36px">Subhead</div><div class="px">36 / 1.15</div></div>
    <div class="row"><div class="name">h4</div><div class="sample" style="font-size:28px">Section</div><div class="px">28 / 1.2</div></div>
    <div class="row"><div class="name">lede</div><div class="sample" style="font-family:var(--font-body);font-size:18px;letter-spacing:-0.005em;font-weight:400;color:var(--fg-2)">Outcomes, not features.</div><div class="px">18 / 1.65</div></div>
    <div class="row"><div class="name">body</div><div class="sample" style="font-family:var(--font-body);font-size:16px;font-weight:400;letter-spacing:0;color:var(--fg-2)">Replace manual work with smart, automated systems.</div><div class="px">16 / 1.5</div></div>
  </div>
</div>
</body></html>
