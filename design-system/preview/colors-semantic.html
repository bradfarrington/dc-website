<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Semantic tokens</title>
<link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.theme { border: 1px solid var(--border-subtle); border-radius: 10px; overflow: hidden; }
.theme .head { padding: 8px 12px; font: 500 11px/1 var(--font-body); letter-spacing: .12em; text-transform: uppercase; border-bottom: 1px solid; }
.theme .body { padding: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; font-size: 11.5px; }
.tok { display: flex; align-items: center; gap: 8px; }
.dot { width: 14px; height: 14px; border-radius: 4px; flex: 0 0 auto; }
.tok .nm { font-family: var(--font-mono); font-size: 11px; }
.light { background: #fff; color: #0A0A0A; }
.light .head { color: #6B6B6B; border-color: #EAEAEA; }
.dark { background: #000; color: #fff; }
.dark .head { color: #A3A3A3; border-color: #2A2A2A; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="theme light">
      <div class="head">Light theme</div>
      <div class="body">
        <div class="tok"><span class="dot" style="background:#fff;outline:1px solid #EAEAEA"></span><span class="nm">--bg</span></div>
        <div class="tok"><span class="dot" style="background:#F5F5F5"></span><span class="nm">--bg-alt</span></div>
        <div class="tok"><span class="dot" style="background:#000"></span><span class="nm">--fg-1</span></div>
        <div class="tok"><span class="dot" style="background:#3D3D3D"></span><span class="nm">--fg-2</span></div>
        <div class="tok"><span class="dot" style="background:#6B6B6B"></span><span class="nm">--fg-3</span></div>
        <div class="tok"><span class="dot" style="background:#A3A3A3"></span><span class="nm">--fg-4</span></div>
        <div class="tok"><span class="dot" style="background:#D4D4D4"></span><span class="nm">--border</span></div>
        <div class="tok"><span class="dot" style="background:#3B82F6"></span><span class="nm">--accent</span></div>
      </div>
    </div>
    <div class="theme dark">
      <div class="head">Dark theme</div>
      <div class="body">
        <div class="tok"><span class="dot" style="background:#000;outline:1px solid #2A2A2A"></span><span class="nm">--bg</span></div>
        <div class="tok"><span class="dot" style="background:#1A1A1A;outline:1px solid #2A2A2A"></span><span class="nm">--bg-alt</span></div>
        <div class="tok"><span class="dot" style="background:#fff"></span><span class="nm">--fg-1</span></div>
        <div class="tok"><span class="dot" style="background:#D4D4D4"></span><span class="nm">--fg-2</span></div>
        <div class="tok"><span class="dot" style="background:#A3A3A3"></span><span class="nm">--fg-3</span></div>
        <div class="tok"><span class="dot" style="background:#6B6B6B"></span><span class="nm">--fg-4</span></div>
        <div class="tok"><span class="dot" style="background:#2A2A2A"></span><span class="nm">--border</span></div>
        <div class="tok"><span class="dot" style="background:#3B82F6"></span><span class="nm">--accent</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
