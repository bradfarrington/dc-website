<!doctype html>
<html lang="en" data-screen-label="Marketing — Home">
<head>
<meta charset="utf-8">
<title>Digital Craft — Bespoke systems for businesses that need to scale without chaos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="../../assets/logo-mark-black.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="marketing.css">
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState("work");
  const [modalOpen, setModalOpen] = useState(false);
  const [toast, setToast] = useState({ show: false, msg: "" });

  const openCTA = () => setModalOpen(true);
  const submitAudit = () => {
    setModalOpen(false);
    setToast({ show: true, msg: "Audit request received — we'll be in touch within 24h." });
    setTimeout(() => setToast(t => ({ ...t, show: false })), 4000);
  };

  return (
    <>
      <Nav active={page} onNav={setPage} onCTA={openCTA} />
      <Hero onCTA={openCTA} />
      <Capabilities />
      <Features />
      <Process />
      <Testimonial />
      <CTABand onCTA={openCTA} />
      <Footer />
      <AuditModal open={modalOpen} onClose={() => setModalOpen(false)} onSubmit={submitAudit} />
      <Toast show={toast.show} message={toast.msg} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App />);
</script>

</body>
</html>
