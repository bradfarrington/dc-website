<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Brand mark — meaning</title>
<link rel="stylesheet" href="_card.css">
<style>
.split { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: center; }
.tile { background: #000; border-radius: 12px; padding: 28px; display: flex; align-items: center; justify-content: center; min-height: 168px; }
.tile img { max-width: 100%; max-height: 120px; }
.copy .lbl { margin-bottom: 8px; }
.copy h3 { font-family: var(--font-display); font-size: 24px; line-height: 1.15; letter-spacing: -0.02em; color: var(--fg-1); margin-bottom: 8px; }
.copy p { font-size: 13.5px; line-height: 1.55; color: var(--fg-2); }
.copy p + p { margin-top: 6px; }
</style>
</head><body>
<div class="card">
  <div class="split">
    <div class="tile"><img src="../assets/logo-mark-white.png" alt=""></div>
    <div class="copy">
      <div class="lbl">THE MARK</div>
      <h3>A tilted grid of soft-cornered tiles.</h3>
      <p>Systemisation, made visual. The grid is structure; the tilt is forward motion; the soft corners keep it human.</p>
      <p>Use it where the brand needs to show up small or quietly — favicons, app icons, dark hero panels — never inline with copy.</p>
    </div>
  </div>
</div>
</body></html>
