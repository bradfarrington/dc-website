<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Type roles</title>
<link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
.cell .lbl { margin-bottom: 6px; }
.cell .ex { color: var(--fg-1); }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="cell">
      <div class="lbl">Eyebrow · 12 / 0.12em</div>
      <div class="ex" style="font: 500 12px/1 var(--font-body); letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3);">HOW IT WORKS</div>
    </div>
    <div class="cell">
      <div class="lbl">Label · 14 medium</div>
      <div class="ex" style="font: 500 14px/1 var(--font-body); letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-2);">PROCESS</div>
    </div>
    <div class="cell">
      <div class="lbl">Caption · 12</div>
      <div class="ex" style="font: 400 12px/1.4 var(--font-body); color: var(--fg-3);">Last updated April 2026</div>
    </div>
    <div class="cell">
      <div class="lbl">Mono · 14</div>
      <div class="ex" style="font: 400 14px/1.4 var(--font-mono); color: var(--fg-2);">/api/v1/leads/route</div>
    </div>
    <div class="cell">
      <div class="lbl">Number · tabular</div>
      <div class="ex" style="font-family: var(--font-display); font-size: 36px; letter-spacing: -0.025em; font-feature-settings:'tnum' 1, 'lnum' 1;">98.4<span style="color:var(--fg-3);font-size:18px;letter-spacing:0">%</span></div>
    </div>
    <div class="cell">
      <div class="lbl">Inline link</div>
      <div class="ex" style="font: 400 16px/1.5 var(--font-body); color: var(--fg-2);">Read the <a href="#" style="color:#3B82F6; text-decoration: underline; text-underline-offset: 4px;">case study</a>.</div>
    </div>
  </div>
</div>
</body></html>
