<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
.r { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.r .sq { width: 64px; height: 64px; background: #0A0A0A; }
.r .nm { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
.r .px { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="r"><div class="sq" style="border-radius:0"></div><div class="nm">none</div><div class="px">0</div></div>
    <div class="r"><div class="sq" style="border-radius:2px"></div><div class="nm">xs</div><div class="px">2</div></div>
    <div class="r"><div class="sq" style="border-radius:4px"></div><div class="nm">sm</div><div class="px">4</div></div>
    <div class="r"><div class="sq" style="border-radius:8px"></div><div class="nm">md ·default</div><div class="px">8</div></div>
    <div class="r"><div class="sq" style="border-radius:12px"></div><div class="nm">lg</div><div class="px">12</div></div>
    <div class="r"><div class="sq" style="border-radius:16px"></div><div class="nm">xl</div><div class="px">16</div></div>
  </div>
</div>
</body></html>
