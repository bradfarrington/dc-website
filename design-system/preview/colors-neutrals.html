<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: repeat(9, 1fr); border: 1px solid var(--border-subtle); border-radius: 10px; overflow: hidden; }
.step { height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 8px; }
.step .n { font-family: var(--font-mono); font-size: 10px; opacity: .9; }
.step .h { font-family: var(--font-mono); font-size: 9.5px; opacity: .65; margin-top: 1px; }
</style>
</head><body>
<div class="card">
  <div class="scale">
    <div class="step" style="background:#000;color:#fff"><div class="n">000</div><div class="h">#000000</div></div>
    <div class="step" style="background:#0A0A0A;color:#fff"><div class="n">ink</div><div class="h">#0A0A0A</div></div>
    <div class="step" style="background:#1A1A1A;color:#fff"><div class="n">bg-alt</div><div class="h">#1A1A1A</div></div>
    <div class="step" style="background:#2A2A2A;color:#fff"><div class="n">graphite</div><div class="h">#2A2A2A</div></div>
    <div class="step" style="background:#3D3D3D;color:#fff"><div class="n">charcoal</div><div class="h">#3D3D3D</div></div>
    <div class="step" style="background:#6B6B6B;color:#fff"><div class="n">slate</div><div class="h">#6B6B6B</div></div>
    <div class="step" style="background:#A3A3A3;color:#000"><div class="n">stone</div><div class="h">#A3A3A3</div></div>
    <div class="step" style="background:#D4D4D4;color:#000"><div class="n">mist</div><div class="h">#D4D4D4</div></div>
    <div class="step" style="background:#F5F5F5;color:#000"><div class="n">paper</div><div class="h">#F5F5F5</div></div>
  </div>
</div>
</body></html>
