<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style>
.spec { display: grid; grid-template-columns: 1fr; gap: 14px; }
.head {
  font-family: var(--font-display);
  font-size: 76px;
  line-height: 0.95;
  letter-spacing: -0.04em;
  color: var(--fg-1);
}
.head em { font-style: normal; color: #3B82F6; }
.meta { display: flex; gap: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.meta span b { color: var(--fg-1); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="spec">
    <div class="head">digital craft<em>.</em></div>
    <div class="meta">
      <span><b>Arboria Book</b> · 400</span>
      <span>76 / 0.95</span>
      <span>tracking −0.04em</span>
      <span>display · h1 · hero</span>
    </div>
  </div>
</div>
</body></html>
